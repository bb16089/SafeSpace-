{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Login - SafeSpace</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffeef2 0%, #fff0f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            box-shadow: 0 8px 32px 0 rgba(224, 90, 122, 0.15);
        }

        h2 {
            margin-bottom: 5px;
            color: #b83d5a;
        }
        
        h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #e05a7a;
            font-size: 1rem;
            font-weight: normal;
        }

        .input-box {
            margin: 20px 0;
            text-align: left;
        }

        .input-box label {
            margin-left: 10px;
            font-size: 14px;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .input-box input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
        }

        .input-box input:focus {
            border-color: #e05a7a;
        }

        .input-box {
            position: relative;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            bottom: 12px;
            color: #888;
        }

        .checkbox {
            display: flex;
            align-items: center;
            margin: 10px 0;
            color: #333;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #e05a7a;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(224, 90, 122, 0.3);
            transition: all 0.3s;
        }

        button:hover {
            background: #b83d5a;
            transform: translateY(-2px);
        }

        .error-msg {
            color: #d32f2f;
            background: #ffebee;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-top: 20px;
            font-size: 14px;
        }

        a {
            color: #e05a7a;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>MENTOR LOGIN</h2>
        <h3>Secure Access Panel</h3>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-box">
                <label>Username</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="margin-left: 8px;">Remember me</label>
            </div>

            <button type="submit">LOGIN TO PANEL</button>
            
            <p>Not a mentor? <a href="{% url 'login' %}">User Login</a></p>
        </form>
    </div>

</body>

</html>
