<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat with {{ mentor_type|title }} Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary: #e05a7a;
      --primary-light: #f3b6c8;
      --primary-dark: #b83d5a;
      --bg-color: #ffeef2;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.4);
      --text-main: #333;
      --text-sub: #666;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .logo a img { height: 50px; }
    .nav-icons { display: flex; gap: 1.5rem; align-items: center; }
    .nav-icons a { color: var(--text-sub); text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 12px; transition: all 0.3s; }
    .nav-icons a:hover { color: var(--primary); background: rgba(224, 90, 122, 0.1); }
    
    .chat-container {
      flex: 1;
      max-width: 800px;
      margin: 2rem auto;
      width: 95%;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px 0 rgba(224, 90, 122, 0.15);
      overflow: hidden;
      height: 75vh;
    }
    .chat-header {
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.5);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .chat-header i { font-size: 2rem; color: var(--primary); }
    .chat-header h2 { font-size: 1.4rem; color: var(--primary-dark); }
    
    .chat-messages {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 75%;
      padding: 1rem;
      border-radius: 15px;
      line-height: 1.5;
      position: relative;
    }
    .message.sent {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 2px;
    }
    .message.received {
      align-self: flex-start;
      background: white;
      color: var(--text-main);
      border-bottom-left-radius: 2px;
      border: 1px solid var(--glass-border);
    }
    .message-time {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-top: 0.5rem;
      text-align: right;
    }
    
    .chat-input {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.5);
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 1rem;
    }
    .chat-input input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: 1px solid #ddd;
      border-radius: 25px;
      outline: none;
      font-size: 1rem;
    }
    .chat-input button {
      background: var(--primary);
      color: white;
      border: none;
      width: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
    }
    .chat-input button:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <a href="{% url 'landing' %}">
        <img src="{% static 'images/Safespace logo.png' %}" alt="SafeSpace Logo">
      </a>
    </div>
    <div class="nav-icons">
      <a href="{% url 'dashboard' %}" title="Dashboard"><i class="fa-solid fa-house"></i></a>
      <a href="{% url 'insights' %}" title="Insights"><i class="fa-solid fa-chart-line"></i></a>
      <a href="{% url 'notifications' %}" title="Notifications"><i class="fa-solid fa-bell"></i></a>
      
      <div class="msg-dropdown" style="position: relative; margin-top:2px;">
        <a href="#" style="background:none; border:none; cursor:pointer;" onclick="toggleMsgDropdown(event)" title="Messages">
          <i class="fa-solid fa-envelope"></i>
        </a>
        <div id="msgDropdownContent" style="display: none; position: absolute; right: 0; top: 45px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 220px; z-index: 1000; overflow: hidden; flex-direction: column;">
          <a href="{% url 'user_mentor_chat' 'academic' %}" style="padding: 1rem; color: #333; text-decoration: none; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; width: 100%; border-radius: 0; justify-content: flex-start; background: transparent;">
            <i class="fa-solid fa-book-open" style="color: #e05a7a; font-size: 1rem;"></i> <span style="font-size: 0.95rem;">Academic Mentor</span>
          </a>
          <a href="{% url 'user_mentor_chat' 'emotional' %}" style="padding: 1rem; color: #333; text-decoration: none; display: flex; align-items: center; gap: 10px; width: 100%; border-radius: 0; justify-content: flex-start; background: transparent;">
            <i class="fa-solid fa-heart" style="color: #e05a7a; font-size: 1rem;"></i> <span style="font-size: 0.95rem;">Emotional Mentor</span>
          </a>
        </div>
      </div>
      <script>
        function toggleMsgDropdown(e) {
          e.preventDefault();
          const content = document.getElementById('msgDropdownContent');
          content.style.display = content.style.display === 'flex' ? 'none' : 'flex';
        }
        document.addEventListener('click', function(e) {
          if (!e.target.closest('.msg-dropdown')) {
            const content = document.getElementById('msgDropdownContent');
            if (content) content.style.display = 'none';
          }
        });
      </script>
    </div>
  </nav>

  <div class="chat-container">
    <div class="chat-header">
      <i class="fa-solid fa-user-graduate"></i>
      <div>
        <h2>{{ mentor_type|title }} Mentor</h2>
        <p style="font-size: 0.9rem; color: var(--text-sub);">Always here to help.</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div style="text-align: center; color: var(--text-sub); margin-top: 2rem;">Loading chat history...</div>
    </div>
    <div class="chat-input" id="chatInputArea">
      <input type="text" id="messageInput" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <script>
    const sessionUserId = "{{ request.user.id }}";
    const currentUserId = "{{ request.user.id }}";
    const mentorType = "{{ mentor_type }}";
    const messagesDiv = document.getElementById('chatMessages');
    const inputField = document.getElementById('messageInput');
    let lastMessageCount = 0;

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
    const csrftoken = getCookie('csrftoken');

    async function fetchMessages() {
      try {
        const res = await fetch(`/api/chat/${sessionUserId}/${mentorType}/`);
        const messages = await res.json();
        
        if (messages.length !== lastMessageCount) {
          renderMessages(messages);
          lastMessageCount = messages.length;
          scrollToBottom();
          markAsRead();
        }
      } catch (err) {
        console.error("Failed to fetch messages", err);
      }
    }

    async function markAsRead() {
      await fetch(`/api/chat/read/${sessionUserId}/${mentorType}/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': csrftoken }
      });
    }

    function renderMessages(messages) {
      if (messages.length === 0) {
        messagesDiv.innerHTML = '<div style="text-align: center; color: var(--text-sub); margin-top: 2rem;">No messages yet. Say hello!</div>';
        return;
      }
      messagesDiv.innerHTML = messages.map(msg => {
        const isSentByMe = String(msg.sender_id) === String(currentUserId);
        return `
          <div class="message ${isSentByMe ? 'sent' : 'received'}">
            <div>${msg.content}</div>
            <div class="message-time">${msg.timestamp.split(' ')[1]}</div>
          </div>
        `;
      }).join('');
    }

    async function sendMessage() {
      const content = inputField.value.trim();
      if (!content) return;
      
      inputField.disabled = true;
      try {
        const res = await fetch(`/api/chat/${sessionUserId}/${mentorType}/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrftoken
          },
          body: JSON.stringify({ content })
        });
        if (res.ok) {
          inputField.value = '';
          await fetchMessages();
        }
      } catch (err) {
        console.error("Failed to send message", err);
      } finally {
        inputField.disabled = false;
        inputField.focus();
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    }

    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Polling every 3 seconds
    setInterval(fetchMessages, 3000);
    fetchMessages();
  </script>
</body>
</html>
