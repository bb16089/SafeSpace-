<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Replying to {{ session_user.username }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Same styles as chat.html but different theme color */
    :root {
      --primary: #e05a7a;
      --primary-light: #f3b6c8;
      --primary-dark: #b83d5a;
      --bg-color: #ffeef2;
      --glass-bg: rgba(255, 255, 255, 0.9);
      --glass-border: rgba(0, 0, 0, 0.1);
      --text-main: #333;
      --text-sub: #666;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      background: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
    }
    
    .chat-container {
      flex: 1;
      max-width: 800px;
      margin: 2rem auto;
      width: 95%;
      background: white;
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow: hidden;
      height: 75vh;
    }
    .chat-header {
      padding: 1rem 1.5rem;
      background: #f9f9f9;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .chat-messages {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 75%;
      padding: 1rem;
      border-radius: 15px;
      line-height: 1.5;
    }
    .message.sent {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 2px;
    }
    .message.received {
      align-self: flex-start;
      background: #f0f0f0;
      color: var(--text-main);
      border-bottom-left-radius: 2px;
    }
    .message-time { font-size: 0.75rem; opacity: 0.7; margin-top: 0.5rem; text-align: right; }
    
    .chat-input {
      padding: 1rem;
      background: #f9f9f9;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 1rem;
    }
    .chat-input input { flex: 1; padding: 0.8rem 1.2rem; border: 1px solid #ddd; border-radius: 25px; outline: none; }
    .chat-input button { background: var(--primary); color: white; border: none; width: 50px; border-radius: 50%; cursor: pointer; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="{% url 'mentor_panel' %}" style="text-decoration:none; color:var(--primary); font-weight:bold;">
      <i class="fa-solid fa-arrow-left"></i> Back to Panel
    </a>
    <h2>SafeSpace Mentor Panel</h2>
  </nav>

  <div class="chat-container">
    <div class="chat-header">
      <div>
        <h3><i class="fa-solid fa-user-secret"></i> Chatting w/ Anonymous User #{{ session_user.id }}</h3>
        <p style="font-size: 0.8rem; color: var(--text-sub);">{{ mentor_type|title }} Consultation</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="Type your reply..." onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <script>
    const sessionUserId = "{{ session_user.id }}";
    const currentUserId = "{{ request.user.id }}";
    const mentorType = "{{ mentor_type }}";
    const messagesDiv = document.getElementById('chatMessages');
    const inputField = document.getElementById('messageInput');
    let lastMessageCount = 0;

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
    const csrftoken = getCookie('csrftoken');

    async function fetchMessages() {
      try {
        const res = await fetch(`/api/chat/${sessionUserId}/${mentorType}/`);
        const messages = await res.json();
        
        if (messages.length !== lastMessageCount) {
          renderMessages(messages);
          lastMessageCount = messages.length;
          scrollToBottom();
          markAsRead();
        }
      } catch (err) {
        console.error("Failed to fetch messages", err);
      }
    }

    async function markAsRead() {
      await fetch(`/api/chat/read/${sessionUserId}/${mentorType}/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': csrftoken }
      });
    }

    function renderMessages(messages) {
      messagesDiv.innerHTML = messages.map(msg => {
        const isSentByMe = String(msg.sender_id) === String(currentUserId);
        return `
          <div class="message ${isSentByMe ? 'sent' : 'received'}">
            <div>${msg.content}</div>
            <div class="message-time">${msg.timestamp.split(' ')[1]}</div>
          </div>
        `;
      }).join('');
    }

    async function sendMessage() {
      const content = inputField.value.trim();
      if (!content) return;
      
      inputField.disabled = true;
      try {
        const res = await fetch(`/api/chat/${sessionUserId}/${mentorType}/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrftoken
          },
          body: JSON.stringify({ content })
        });
        if (res.ok) {
          inputField.value = '';
          await fetchMessages();
        }
      } catch (err) { }
      finally {
        inputField.disabled = false;
        inputField.focus();
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }
    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    setInterval(fetchMessages, 3000);
    fetchMessages();
  </script>
</body>
</html>
