<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSpace – Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #e05a7a;
            --primary-light: #f3b6c8;
            --primary-dark: #b83d5a;
            --bg-color: #ffeef2;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #333;
            --text-sub: #666;
            --shadow: 0 8px 32px 0 rgba(224, 90, 122, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, #fff0f5 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo img {
            height: 50px;
        }

        .nav-links a {
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 600;
            margin-left: 1.5rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .stat-card h3 {
            font-size: 1.2rem;
            color: var(--text-sub);
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(224, 90, 122, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--bg-color);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a href="{% url 'landing' %}">
                <img src="{% static 'images/Safespace logo.png' %}" alt="SafeSpace Logo">
            </a>
        </div>
        <div class="nav-links">
            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background:none; border:none; color:var(--text-sub); font-weight:600; cursor:pointer; margin-left:1.5rem;">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <p>Welcome, Administrator. Manage your community resources here.</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-bell"></i>
                <h3>Total Notifications</h3>
                <div class="value">{{ notifications_count }}</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-message"></i>
                <h3>Total Posts</h3>
                <div class="value">{{ posts_count }}</div>
            </div>
        </div>

        <div class="actions">
            <a href="{% url 'manage_notifications' %}" class="btn btn-secondary">
                <i class="fa-solid fa-bullhorn"></i> Manage Notifications
            </a>
            <a href="{% url 'manage_posts' %}" class="btn btn-secondary">
                <i class="fa-solid fa-message"></i> Manage Posts
            </a>
        </div>
    </main>
</body>

</html>
